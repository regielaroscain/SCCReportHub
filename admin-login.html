<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCC ReportHub - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0d2a 0%, #1a1f4d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            text-align: center;
            padding: 50px;
        }

        .title {
            color: #c8c8d8;
            font-size: 48px;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 80px;
            text-transform: uppercase;
        }

        .form-title {
            color: #5b8dd8;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 2px;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        input {
            display: block;
            width: 350px;
            padding: 14px 20px;
            margin: 15px auto;
            background: rgba(91, 141, 216, 0.12);
            border: 2px solid rgba(91, 141, 216, 0.5);
            border-radius: 35px;
            color: #a8b8d8;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(168, 184, 216, 0.6);
        }

        input:focus {
            outline: none;
            border-color: #7b9dd8;
            background: rgba(91, 141, 216, 0.2);
            box-shadow: 0 0 15px rgba(107, 126, 232, 0.3);
        }

        button {
            display: block;
            width: 350px;
            padding: 14px 20px;
            margin: 30px auto 0;
            background: linear-gradient(90deg, #0052ff 0%, #0041cc 100%);
            color: white;
            border: none;
            border-radius: 35px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 6px 25px rgba(0, 82, 255, 0.5);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(0, 82, 255, 0.7);
        }

        @media (max-width: 600px) {
            input, button {
                width: 90%;
                max-width: 300px;
            }

            .title {
                font-size: 32px;
                margin-bottom: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1 class="title">SCC ReportHub</h1>

        <h2 class="form-title">ADMIN ACCESS</h2>

        <form action="/admin/login" method="POST">
            <input type="text" placeholder="Employee ID" required>
            <input type="password" placeholder="Password" required>
            <button type="submit">LOGIN</button>
        </form>
    </div>
</body>
</html>
