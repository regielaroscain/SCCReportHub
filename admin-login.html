<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            height: 100vh;
        }
        .branding {
            background: linear-gradient(to right, #8e44ad, #4b0082);
            color: white;
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            flex-direction: column;
        }
        .login-form {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: white;
            padding: 40px;
            box-shadow: 2px 2px 15px rgba(0, 0, 0, 0.1);
        }
        .form-container {
            width: 100%;
            max-width: 400px;
        }
        h2 {
            margin-bottom: 20px;
            text-align: center;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            transition: border-color 0.3s ease;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #8e44ad;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #8e44ad;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #732d91;
        }
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .branding, .login-form {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="branding">
        <h1>SCC ReportHub</h1>
        <p>Welcome to the Admin Portal</p>
    </div>
    <div class="login-form">
        <div class="form-container">
            <h2>Login</h2>
            <form>
                <input type="text" placeholder="Username" required/>
                <input type="password" placeholder="Password" required/>
                <button type="submit">Login</button>
            </form>
        </div>
    </div>
</body>
</html>
